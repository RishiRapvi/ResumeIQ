services:
  - type: web
    name: resumeiq
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: ANTHROPIC_API_KEY
        sync: false
